# CI for lexa-hub.
#
# Three required checks, split on the verified cgo boundary: only
# internal/wolfssl and internal/tlsclient (and the two services that import
# tlsclient, cmd/northbound + cmd/telemetry) need wolfSSL headers. Everything
# else, including internal/northbound, is pure Go.
#
#   vet-build-test  go vet + cgo-free build + `-race` over every pure-Go
#                   package (internal/... and cmd/...).
#   cgo             builds wolfSSL 5.7.6-stable from source (cached), then
#                   builds + `-race` tests the two cgo services/packages.
#   cross           CGO_ENABLED=0 GOOS=linux GOARCH=arm64 build of the four
#                   pure-Go services — proves the deploy artifacts still
#                   cross-compile. The arm64 cgo pair (northbound, telemetry)
#                   needs the aarch64 sysroot and stays a desktop-only
#                   `make build-arm64`.
#   fuzz            TASK-047, nightly cron only: 15m/target go-native fuzzing
#                   of internal/tlsclient/httpwire, the CGo-free leaf package
#                   extracted from tlsclient's former hand-rolled HTTP
#                   response parser (D9/§10.2). No wolfSSL sysroot needed —
#                   httpwire imports stdlib only — unlike every other job
#                   above; not gated on PR/push because 45 min of fuzzing is
#                   a poor latency trade for a parser that's otherwise unit-
#                   tested, not because it needs anything special to build.
#
# Self-hosted runner fallback: if hosted GitHub runners become unacceptable
# under an air-gap policy, any of these jobs can move to
# `runs-on: [self-hosted, desktop]` — the bench desktop already carries the
# amd64 wolfSSL sysroot at ~/.local/wolfssl-amd64 (see Makefile) and is the
# natural home for future bench-touching jobs (SSH to the 69.0.0.x Pis, live
# conformance runs) that must never run on a hosted runner. Registering that
# runner requires a repo-scoped registration token from
# Settings > Actions > Runners > New self-hosted runner — not set up here.
#
# No bench/SSH/secret access: these jobs only ever talk to GitHub and
# github.com/wolfSSL — no 69.0.0.x, no credentials beyond the default
# GITHUB_TOKEN.
#
# TASK-005: `vulncheck` job runs a pinned govulncheck (scripts/ci/govulncheck.sh)
# on every PR/push AND nightly (new CVEs land without a code change). It reuses
# the `cgo` job's wolfSSL cache/build steps — govulncheck needs the whole
# module to *build* (cgo packages included) or it silently scans less than you
# think. Required (blocking) as of TASK-006: the first baseline scan's 2
# reachable findings (paho.mqtt.golang GO-2025-4173, x/net GO-2025-3503) are
# both cleared — see ../csip-tls-test/docs/refactor/VULN_BASELINE_2026-07-04.md
# and its TASK-006 addendum.
#
# TASK-024: `proto-pin` job -- shared-module (lexa-proto, AD-003) version-pin
# gate. Checks out csip-tls-test (the peer consumer repo) via a new
# CSIP_TLS_TEST_RO_TOKEN secret and runs its scripts/check-proto-pin.sh
# (single implementation, lives in csip-tls-test only) comparing the two
# repos' committed proto.pin files. This is the mirror image of
# csip-tls-test's own proto-pin job (which checks out lexa-hub via
# LEXA_HUB_RO_TOKEN) -- TASK-004's old lockstep gate ran only in
# csip-tls-test CI, which let an asymmetric bump go undetected on this side;
# TASK-024 closes that by gating both repos.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * *' # nightly vuln scan + httpwire fuzz (UTC); see `vulncheck`/`fuzz` jobs below

permissions:
  contents: read

# TASK-019 committed a go.work (`use (. ../lexa-proto)`) for local dev against
# the in-progress shared module, with GOWORK=off set here because hosted
# runners never have a `../lexa-proto` sibling. TASK-024 removes go.work from
# version control (AD-003(d)/(e)): the build now goes through the committed
# `require lexa-proto v0.0.0` + `replace lexa-proto => ../lexa-proto` +
# vendor/lexa-proto/ in go.mod, which Go auto-selects (`-mod=vendor`) whenever
# vendor/modules.txt is present and consistent — no GOWORK setting needed for
# that to work, and none exists to turn off since the file isn't committed.
# Developers may still keep an untracked local go.work (gitignored) for
# cross-repo dev against a live ../lexa-proto checkout; it never reaches CI.
jobs:
  vet-build-test:
    name: vet-build-test
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet (pure-Go surface)
        run: |
          go vet $(go list ./... | grep -v -e internal/wolfssl -e internal/tlsclient -e cmd/northbound -e cmd/telemetry)

      - name: build (cgo-free services)
        run: CGO_ENABLED=0 go build ./cmd/hub ./cmd/modbus ./cmd/ocpp ./cmd/api

      # TASK-053: the generative int16/scale-factor boundary sweep (GAP-07)
      # needs no new step here — it lands as ordinary _test.go files in
      # packages already globbed by `make test-nocgo`
      # (internal/southbound/sunspecsweep runs the shared lexa-proto/sunspec
      # codec contract against this repo's vendored copy; cmd/hub +
      # cmd/modbus carry the wattsToActivePower/activePowerFromWatts
      # encode-scaling + cross-encoder-agreement sweep). Verified locally:
      # `make test-nocgo` picks up all three without modification.
      - name: "test -race (pure-Go: internal/... + cmd/...)"
        run: make test-nocgo

  cgo:
    name: cgo
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    env:
      WOLFSSL_VER: 5.7.6-stable
      WOLFSSL_SYSROOT: /home/runner/wolfssl-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache wolfSSL sysroot
        id: cache-wolfssl
        uses: actions/cache@v4
        with:
          path: ${{ env.WOLFSSL_SYSROOT }}
          key: wolfssl-${{ env.WOLFSSL_VER }}-${{ runner.os }}-v1

      - name: Build wolfSSL from source (cache miss only)
        if: steps.cache-wolfssl.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool m4

          cd /tmp
          wget -q "https://github.com/wolfSSL/wolfssl/archive/refs/tags/v${WOLFSSL_VER}.tar.gz" \
            -O "wolfssl-${WOLFSSL_VER}.tar.gz"
          tar xzf "wolfssl-${WOLFSSL_VER}.tar.gz"
          cd "wolfssl-${WOLFSSL_VER}"
          autoreconf -i

          mkdir -p /tmp/wolfssl-build
          cd /tmp/wolfssl-build
          # Host build (no --host=): the runner builds and runs on the same
          # amd64 target, unlike the Makefile's arm64 cross-build recipe.
          # Flag set otherwise identical to the Makefile's wolfssl-arm64
          # target — the CCM cipher invariant depends on --enable-aesccm.
          "/tmp/wolfssl-${WOLFSSL_VER}/configure" \
            --prefix="${WOLFSSL_SYSROOT}" \
            --enable-tls13 --enable-aesccm --enable-tlsx \
            --enable-certgen --enable-opensslall \
            --enable-static --disable-shared \
            --disable-examples --disable-crypttests
          make -j"$(nproc)"
          make install

      - name: Build cgo services
        env:
          CGO_CFLAGS: -I${{ env.WOLFSSL_SYSROOT }}/include
          # Static libwolfssl.a needs -lm (pow/log in dh.c) or this fails
          # at link time with undefined pow/log.
          CGO_LDFLAGS: -L${{ env.WOLFSSL_SYSROOT }}/lib -lm
        run: go build ./cmd/northbound ./cmd/telemetry

      - name: "test -race (cgo: tlsclient, wolfssl, northbound)"
        env:
          CGO_CFLAGS: -I${{ env.WOLFSSL_SYSROOT }}/include
          CGO_LDFLAGS: -L${{ env.WOLFSSL_SYSROOT }}/lib -lm
        # The integration-tagged handshake tests in internal/tlsclient
        # (client_test.go, fetcher_test.go) stay desktop/bench-only via
        # `make test-integration` in csip-tls-test; plain `go test` here
        # compiles the package and runs everything else, including
        # cmd/northbound's response_test.go.
        run: go test -race ./internal/tlsclient/ ./internal/wolfssl/ ./cmd/northbound/

  cross:
    name: cross
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: cross-compile arm64 (deploy artifacts, pure-Go)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/hub ./cmd/modbus ./cmd/ocpp ./cmd/api

  # TASK-005: pinned govulncheck (scripts/ci/govulncheck.sh) + triage
  # allowlist (scripts/ci/vuln-allowlist.txt). Reuses the `cgo` job's wolfSSL
  # cache/build steps — govulncheck must build the whole module (cgo packages
  # included) or it silently scans a shrunken package set. Gates only on
  # REACHABLE findings (real call path, not merely imported or transitively
  # required); everything else is informational. Runs on PR, push:main, and
  # the nightly cron (new CVEs land with no code change). Required (blocking)
  # as of TASK-006's dependency refresh, which cleared the baseline — see
  # ../csip-tls-test/docs/refactor/VULN_BASELINE_2026-07-04.md.
  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    env:
      WOLFSSL_VER: 5.7.6-stable
      WOLFSSL_SYSROOT: /home/runner/wolfssl-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache wolfSSL sysroot
        id: cache-wolfssl
        uses: actions/cache@v4
        with:
          path: ${{ env.WOLFSSL_SYSROOT }}
          key: wolfssl-${{ env.WOLFSSL_VER }}-${{ runner.os }}-v1

      - name: Build wolfSSL from source (cache miss only)
        if: steps.cache-wolfssl.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool m4

          cd /tmp
          wget -q "https://github.com/wolfSSL/wolfssl/archive/refs/tags/v${WOLFSSL_VER}.tar.gz" \
            -O "wolfssl-${WOLFSSL_VER}.tar.gz"
          tar xzf "wolfssl-${WOLFSSL_VER}.tar.gz"
          cd "wolfssl-${WOLFSSL_VER}"
          autoreconf -i

          mkdir -p /tmp/wolfssl-build
          cd /tmp/wolfssl-build
          "/tmp/wolfssl-${WOLFSSL_VER}/configure" \
            --prefix="${WOLFSSL_SYSROOT}" \
            --enable-tls13 --enable-aesccm --enable-tlsx \
            --enable-certgen --enable-opensslall \
            --enable-static --disable-shared \
            --disable-examples --disable-crypttests
          make -j"$(nproc)"
          make install

      - name: govulncheck (pinned, reachable-findings gate)
        env:
          CGO_CFLAGS: -I${{ env.WOLFSSL_SYSROOT }}/include
          CGO_LDFLAGS: -L${{ env.WOLFSSL_SYSROOT }}/lib -lm
        run: |
          set -o pipefail
          bash scripts/ci/govulncheck.sh 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

  # TASK-047: nightly go-native fuzzing of internal/tlsclient/httpwire, the
  # CGo-free parsing core extracted from tlsclient's former readResponse
  # (D9/§10.2 — "hand-rolled HTTP parsing on the untrusted boundary ... fuzz
  # it or replace it"). Unlike `cgo`/`vulncheck` above, this job needs no
  # wolfSSL sysroot at all: httpwire imports nothing beyond stdlib, so it's
  # the cheapest job to run and the whole reason the leaf package exists.
  # Merge gate for TASK-047 itself is these three runs green; a crasher
  # found here after merge writes a regression file under
  # internal/tlsclient/httpwire/testdata/fuzz/<FuzzName>/, which every
  # subsequent `go test` (no -fuzz needed) reruns as a normal test case —
  # the artifact upload below is a convenience for grabbing that file out of
  # a run that failed before anyone noticed on their own machine.
  #
  # TASK-048 adds the other two untrusted decode surfaces to this same
  # nightly job: the 2030.5 XML unmarshal path (internal/northbound/scheduler,
  # driving the plausibleControl/plausibleLimit gate against decoded
  # DERControlList/DeviceCapability/Time documents) and the bus JSON decode
  # path (internal/bus, mirroring mqttutil.Subscribe[T]'s CheckVersion +
  # json.Unmarshal). Both are pure Go (csipmodel/bus import nothing beyond
  # encoding/xml, encoding/json, and stdlib) — no wolfSSL sysroot needed here
  # either, same as httpwire. Crashers land under each package's own
  # testdata/fuzz/<FuzzName>/ and are uploaded the same way.
  fuzz:
    name: fuzz (nightly, httpwire + 2030.5 XML + bus JSON)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: fuzz httpwire (15m/target, no cgo)
        run: |
          set -o pipefail
          go test -fuzz=FuzzReadHTTPResponse      -fuzztime=15m ./internal/tlsclient/httpwire/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          go test -fuzz=FuzzResponseContentLength -fuzztime=15m ./internal/tlsclient/httpwire/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          go test -fuzz=FuzzIsChunkedEncoding      -fuzztime=15m ./internal/tlsclient/httpwire/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: fuzz 2030.5 XML decode (15m/target, no cgo) — TASK-048
        run: |
          set -o pipefail
          go test -fuzz=FuzzUnmarshalDeviceCapability -fuzztime=15m ./internal/northbound/scheduler/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          go test -fuzz=FuzzUnmarshalTime             -fuzztime=15m ./internal/northbound/scheduler/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          go test -fuzz=FuzzUnmarshalDERControlList   -fuzztime=15m ./internal/northbound/scheduler/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: fuzz bus JSON decode (15m, no cgo) — TASK-048
        run: |
          set -o pipefail
          go test -fuzz=FuzzBusDecode -fuzztime=15m ./internal/bus/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: upload crashers (only present on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashers
          path: |
            internal/tlsclient/httpwire/testdata/fuzz/*/
            internal/northbound/scheduler/testdata/fuzz/*/
            internal/bus/testdata/fuzz/*/
          if-no-files-found: ignore
  # TASK-024: shared-module version-pin gate (AD-003(c)) -- mirror image of
  # csip-tls-test's proto-pin job. See the header comment above `on:` for the
  # PAT/secret rationale.
  proto-pin:
    name: proto-pin
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout lexa-hub (this repo)
        uses: actions/checkout@v4

      - name: Checkout csip-tls-test (peer consumer) read-only
        uses: actions/checkout@v4
        with:
          repository: dsizzle83/csip-tls-test
          token: ${{ secrets.CSIP_TLS_TEST_RO_TOKEN }}
          path: csip-tls-test

      - name: proto.pin version-pin check (fails on mismatch -- no allowlist)
        run: bash csip-tls-test/scripts/check-proto-pin.sh --self . --product csip-tls-test --no-proto-check
