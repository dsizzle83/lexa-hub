# /etc/mosquitto/conf.d/lexa.conf
# Mosquitto MQTT broker configuration for the LEXA hub.
# Install: cp systemd/mosquitto-lexa.conf /etc/mosquitto/conf.d/lexa.conf
# Enable: systemctl enable --now mosquitto

listener 1883 localhost

# Per-service credentials + topic ACL (TASK-013 / W7 / AD-008). Anonymous
# access used to be considered acceptable because the listener is
# localhost-only and the SOM ran nothing but lexa services — that stopped
# being true the day scripts/mqtt-chaos.sh (csip-tls-test) started deploying
# a third-party process (cmd/mqttproxy) onto this host for QA fault
# injection: any local process could command hardware. Every lexa-* service
# now authenticates with its own broker user (password_file below); the ACL
# file grants each user only the topics internal/bus/topics.go says it
# publishes/subscribes (see mosquitto-lexa.acl — it's the authoritative
# matrix, re-derived from actual Subscribe/Publish call sites).
#
# Passwords are generated on-device by scripts/deploy-hub-pi.sh
# (mosquitto_passwd -b against password_file, per-service secrets under
# /etc/lexa/mqtt/<svc>.pass, 0600 lexa:lexa) — never committed to git or a
# deploy artifact. The bench rollout is staged: deploy-hub-pi.sh populates
# every service's mqtt_user/mqtt_pass_file and installs password_file/
# acl_file on disk before this allow_anonymous flips to false (its
# --enable-mqtt-acl flag), so no service loses its connection mid-rollout.
allow_anonymous false
password_file /etc/mosquitto/lexa-passwd
acl_file /etc/mosquitto/lexa-acl

# Persist messages so the retained CSIP control survives broker restarts.
persistence true
persistence_location /var/lib/mosquitto/
# Bound the retained-store loss window on power cut.
autosave_interval 60

# Backpressure: bound per-client queues so a lagging subscriber degrades
# (drops QoS 0 / queues bounded QoS 1) instead of growing broker memory.
max_inflight_messages 20
max_queued_messages 1000

log_dest syslog
log_type error
log_type warning
log_type information
