# journald size/retention budget for the LEXA hub Pi (TASK-009, review §11
# flash wear / RSK-14). Installed by scripts/deploy-hub-pi.sh to
# /etc/systemd/journald.conf.d/lexa.conf — a conf.d drop-in, never edited in
# place on the Pi, so the config stays reproducible by the deploy script.
#
# See lexa-hub/docs/FLASH_BUDGET.md for the measured/estimated line-rate and
# wear math behind these numbers.
#
# SystemMaxUse bounds total on-disk journal size regardless of retention
# time; SystemKeepFree ensures the journal never eats into space the rest of
# the SD/eMMC needs (OS, /etc/lexa configs, Mosquitto persistence autosave on
# the same partition). MaxRetentionSec is a belt-and-suspenders time cap —
# whichever of the two (size or time) is hit first wins.
#
# Deliberately NOT setting MaxLevelStore: the services log at info level
# throughout, and level-filtering isn't the mechanism here (rejected in the
# TASK-009 PR — see FLASH_BUDGET.md). Per-unit LogRateLimitIntervalSec/
# LogRateLimitBurst in each systemd/lexa-*.service is what clamps runaway
# per-unit spam; this file only bounds the aggregate journal footprint.
[Journal]
SystemMaxUse=200M
SystemKeepFree=500M
MaxRetentionSec=1month
