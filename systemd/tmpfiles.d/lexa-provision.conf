# systemd-tmpfiles: create the runtime dir for the BLE re-provision window
# file (ADR-0002, unit B4). The re-provision window is a single file,
# /run/lexa/provision-window, holding a Unix-seconds expiry; `lexactl provision
# --window <dur>` writes it and lexa-provision reads it to decide whether to
# advertise while commissioned. /run is tmpfs, so the directory (and any open
# window) evaporates on reboot — the safe default: a re-provision window never
# survives a power cycle.
#
# Install this to /etc/tmpfiles.d/lexa-provision.conf on a provisioning-capable
# image (the same images that enable lexa-provision.service — see that unit's
# [Install] note that it is NOT auto-enabled on every hub). `systemd-tmpfiles
# --create /etc/tmpfiles.d/lexa-provision.conf` applies it without a reboot.
#
# Owner root:root (the dev kit has no lexa user; lexa-provision runs as root —
# see lexa-provision.service). On a hardened image that drops the service to
# User=lexa, change the owner columns to lexa lexa so both the service (read)
# and `lexactl provision` (write, run as that user) can reach the file. lexactl
# also MkdirAll's this directory before writing, so a missing tmpfiles drop-in
# is not fatal — this just guarantees correct mode/owner at boot.
#
# Type Path         Mode UID  GID  Age Argument
d      /run/lexa    0755 root root -   -
